<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calendar</title>

<link rel="stylesheet" href="../css/calendar.css?v=final">

</head>

<body>

<div class="calendar">

    <!-- HEADER -->
    <div class="header">
        <button id="prevMonth">◀</button>
        <h2 id="monthTitle"></h2>
        <button id="nextMonth">▶</button>
    </div>

    <!-- DAYS -->
    <div class="day-names" id="dayNames"></div>

    <!-- GRID -->
    <div id="calendarGrid" class="grid"></div>

</div>

<script src="../js/calendar.js?v=final"></script>

</body>
</html>
