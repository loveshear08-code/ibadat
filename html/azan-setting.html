<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Azan Settings</title>

<style>
body{
    font-family: Arial;
    background:#e6f7ee;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.card{
    background:#ffffff;
    padding:25px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    text-align:center;
}

/* TITLE */
.title{
    font-size:22px;
    margin-bottom:10px;
}

/* LIST */
.azan-list{
    margin-top:20px;
    text-align:left;
}

.item{
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
    background:#f1fbf5;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

.item.active{
    background:#c8f2dc;
}

/* BUTTONS */
.buttons{
    margin-top:20px;
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    background:#4caf50;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#3e9442;
}

/* STATUS */
.status{
    margin-top:10px;
    font-size:14px;
    color:green;
}
</style>

</head>

<body>

<div class="card">

<h2 class="title" data-key="azanSettings">Azan Settings</h2>
<p data-key="selectAzan">Select Azan Sound</p>

<div class="azan-list" id="azanList"></div>

<div class="buttons">
<button onclick="saveAzan()" data-key="save">Save</button>
<button onclick="testAzan()" data-key="test">Test</button>
</div>

<div class="status" id="status"></div>

</div>

<!-- LANGUAGE -->
<script src="../js/lang.js"></script>

<script>

const azans = [
    {name:"Makkah", file:"makkah.mp3"},
    {name:"Madinah", file:"madinah.mp3"},
    {name:"Kuwait", file:"kuwait.mp3"},
    {name:"Bangladesh", file:"bangladesh.mp3"},
    {name:"Alaska", file:"alaska.mp3"}
];

let selected = localStorage.getItem("azanVoice") || "makkah.mp3";
let audio = null;

/* LOAD LIST */
function loadAzan(){
    const list = document.getElementById("azanList");
    list.innerHTML="";

    azans.forEach(a=>{
        const div=document.createElement("div");
        div.className="item";

        if(a.file===selected){
            div.classList.add("active");
        }

        div.innerHTML = `
            <span>${a.name}</span>
            <span>${a.file===selected ? "✔" : ""}</span>
        `;

        div.onclick=()=>{
            selected=a.file;
            loadAzan();
        }

        list.appendChild(div);
    });
}

/* SAVE */
function saveAzan(){
    localStorage.setItem("azanVoice",selected);

    document.getElementById("status").innerText="✔ Saved";
}

/* TEST */
function testAzan(){

    if(audio){
        audio.pause();
    }

    audio=new Audio("../assets/"+selected);
    audio.play();
}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
    loadAzan();
    applyLang();
});

</script>
    <script src="../js/azan-ui.js"></script>
<script src="../js/azan-auto.js"></script>
    <script src="../js/azan-api.js"></script>

</body>
</html>
