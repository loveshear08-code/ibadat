<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBADAT</title>

<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="top-bar">
<span id="city"></span>
<span id="date"></span>
</div>

<div class="main-container">

<!-- BISMILLAH -->
<div class="box bismillah-box" id="bismillahCard">
<div class="bismillah-ar">
بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
</div>
<div id="bismillahMeaning"></div>
</div>

<!-- STATUS -->
<div class="box status-box" id="statusBoard">

<div class="row">
<span id="todayDay"></span>
<span id="weather"></span>
</div>

<div class="center">
<div id="clock"></div>
</div>

<div class="row">
<span id="currentPrayerName"></span>
<span id="nextPrayerName"></span>
</div>

</div>

<!-- PRAYER LIST (ONE BOX) -->
<div class="box prayer-list" id="prayerList"></div>

<!-- FEATURES -->
<div class="feature-grid">
<div class="feature-box" id="namaz"></div>
<div class="feature-box" id="quran"></div>
<div class="feature-box" id="dua"></div>
<div class="feature-box" id="hadith"></div>
<div class="feature-box" id="qibla"></div>
<div class="feature-box" id="tasbih"></div>
</div>

</div>

<div class="bottom-bar">
<span id="bottomText"></span>
</div>

<script src="../js/home.js"></script>

</body>
</html>
