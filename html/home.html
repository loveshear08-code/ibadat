<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBADAT</title>
<link rel="stylesheet" href="../css/home.css">
</head>

<body>

<div class="top-bar">
<span id="city"></span>
<span id="date"></span>
</div>

<div class="main-container">

<!-- BISMILLAH -->
<div class="box">
<div class="bismillah-ar">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
<div id="bismillahMeaning"></div>
</div>

<!-- STATUS -->
<div class="box">

<div class="row">
<span id="todayDay"></span>
<span id="weather"></span>
</div>

<div id="clock"></div>

<div class="row">
<span id="currentPrayerName"></span>
<span>/</span>
<span id="nextPrayerName"></span>
</div>

<div id="countdown"></div>

</div>

<!-- PRAYER -->
<div class="box">
<div class="prayer-grid" id="prayerList"></div>
</div>

<!-- FEATURES -->
<div class="feature-grid">

<div class="feature" id="namaz"></div>
<div class="feature" id="quran"></div>

<div class="feature" id="dua"></div>
<div class="feature" id="hadith"></div>

<div class="feature" id="qibla"></div>
<div class="feature" id="tasbih"></div>

</div>

</div>

<div class="bottom-bar">
<span id="bottomText"></span>
</div>

<script src="../js/home.js"></script>

</body>
</html>
