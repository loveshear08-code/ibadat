<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBADAT</title>

<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
<span id="city"></span>
<span id="date"></span>
</div>

<!-- MAIN -->
<div class="main-container">

<!-- BISMILLAH -->
<div class="card bismillah-card" id="bismillahCard">
<div class="bismillah-ar">
بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
</div>
<div id="bismillahMeaning" class="bismillah-meaning"></div>
</div>

<!-- PRAYER STATUS -->
<div class="card status-card" id="statusBoard">

<div class="status-top">
<span id="todayDay"></span>
<span id="weather"></span>
</div>

<div class="status-middle">

<div class="current">
<div id="currentPrayerName"></div>
<div id="clock"></div>
</div>

<div class="divider">/</div>

<div class="next">
<div id="nextPrayerName"></div>
<div id="countdown"></div>
</div>

</div>

</div>

<!-- PRAYER GRID -->
<div class="prayer-grid" id="prayerGrid"></div>

<!-- FEATURES -->
<div class="feature-grid">

<div class="feature-box" id="namaz"></div>
<div class="feature-box" id="quran"></div>

<div class="feature-box" id="dua"></div>
<div class="feature-box" id="hadith"></div>

<div class="feature-box" id="qibla"></div>
<div class="feature-box" id="tasbih"></div>

</div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
<span id="bottomText"></span>
</div>

<script src="../js/home.js"></script>

</body>
</html>
