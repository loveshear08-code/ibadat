<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet" href="../css/settings.css">

</head>

<body>

<div class="container">

<h2 id="settingsTitle">⚙️ সেটিংস</h2>

<!-- AZAN -->
<div class="card">
<h3 id="azanTitle">আজান সাউন্ড</h3>

<div class="option" data-azan="makkah" onclick="setAzan('makkah')">
<span>মক্কা</span>
<span class="right">
<button onclick="playAzan(event,'makkah')">▶️</button>
<span class="tick"></span>
</span>
</div>

<div class="option" data-azan="madinah" onclick="setAzan('madinah')">
<span>মদিনা</span>
<span class="right">
<button onclick="playAzan(event,'madinah')">▶️</button>
<span class="tick"></span>
</span>
</div>

<div class="option" data-azan="kuwait" onclick="setAzan('kuwait')">
<span>কুয়েত</span>
<span class="right">
<button onclick="playAzan(event,'kuwait')">▶️</button>
<span class="tick"></span>
</span>
</div>

<div class="option" data-azan="bangladesh" onclick="setAzan('bangladesh')">
<span>বাংলাদেশ</span>
<span class="right">
<button onclick="playAzan(event,'bangladesh')">▶️</button>
<span class="tick"></span>
</span>
</div>

<div class="option" data-azan="alaska" onclick="setAzan('alaska')">
<span>আলাস্কা</span>
<span class="right">
<button onclick="playAzan(event,'alaska')">▶️</button>
<span class="tick"></span>
</span>
</div>

</div>

<!-- LANGUAGE -->
<div class="card">
<h3 id="langTitle">ভাষা</h3>

<select id="langSelect">
<option value="bn">বাংলা</option>
<option value="en">English</option>
<option value="hi">हिंदी</option>
</select>

</div>

<!-- THEME -->
<div class="card">
<h3 id="themeTitle">থিম</h3>

<label>
<input type="checkbox" id="darkMode">
<span id="darkLabel">ডার্ক মোড</span>
</label>

</div>

<!-- BUTTON -->
<div class="btn-box">
<button id="saveBtn" onclick="saveSettings()">সেভ</button>
</div>

</div>

<script src="../js/settings.js?v=4"></script>

</body>
</html>
