<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet" href="../css/settings.css">

</head>

<body>

<div class="container">

<h2>⚙️ সেটিংস</h2>

<!-- AZAN -->
<div class="card">
<h3>আজান সাউন্ড</h3>

<div class="option" onclick="setAzan('makkah')">মক্কা</div>
<div class="option" onclick="setAzan('madinah')">মদিনা</div>
<div class="option" onclick="setAzan('kuwait')">কুয়েত</div>
<div class="option" onclick="setAzan('bangladesh')">বাংলাদেশ</div>
<div class="option active" onclick="setAzan('alaska')">আলাস্কা ✔</div>

</div>

<!-- LANGUAGE -->
<div class="card">
<h3>ভাষা</h3>

<select id="langSelect">
<option value="bn">বাংলা</option>
<option value="en">English</option>
<option value="hi">हिंदी</option>
</select>

</div>

<!-- THEME -->
<div class="card">
<h3>থিম</h3>

<label>
<input type="checkbox" id="darkMode"> ডার্ক মোড
</label>

</div>

<!-- BUTTON -->
<div class="btn-box">
<button onclick="saveSettings()">সেভ</button>
</div>

</div>

<script src="../js/settings.js?v=3"></script>

</body>
</html>
