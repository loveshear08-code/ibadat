<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Settings</title>

<style>
body{
    font-family: Arial;
    background:#e6f7ee;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    background:#ffffff;
    padding:25px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    text-align:center;
}
.item{
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
    background:#f1fbf5;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}
.item.active{
    background:#c8f2dc;
}
.buttons{
    margin-top:20px;
    display:flex;
    gap:10px;
}
button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4caf50;
    color:white;
}
.status{
    margin-top:10px;
    color:green;
}
</style>

</head>

<body>

<div class="card">

<h2 id="settingsTitle">⚙️ Settings</h2>

<h3 id="azanTitle">আজান সেটিং</h3>
<p id="azanDesc">আজানের সাউন্ড নির্বাচন করুন</p>
<div id="azanList"></div>

<h3 id="langTitle">Language</h3>
<select id="langSelect">
<option value="bn">বাংলা</option>
<option value="en">English</option>
<option value="hi">हिंदी</option>
</select>

<h3 id="themeTitle">Theme</h3>
<label>
<input type="checkbox" id="darkToggle">
<span id="darkLabel">Dark Mode</span>
</label>

<div class="buttons">
<button id="saveBtn" onclick="saveSettings()">Save</button>
<button id="testBtn" onclick="testAzan()">Test</button>
</div>

<div id="status" class="status"></div>

</div>

<script src="../js/settings.js"></script>

<script>

const azans = [
{name:"মক্কা",file:"makkah.mp3"},
{name:"মদিনা",file:"madinah.mp3"},
{name:"কুয়েত",file:"kuwait.mp3"},
{name:"বাংলাদেশ",file:"bangladesh.mp3"},
{name:"আলাস্কা",file:"alaska.mp3"}
];

let selected="makkah.mp3";
let audio=null;

function loadAzan(){
    const list=document.getElementById("azanList");
    list.innerHTML="";

    azans.forEach(a=>{
        const div=document.createElement("div");
        div.className="item";

        if(a.file===selected){
            div.classList.add("active");
        }

        div.innerHTML=`<span>${a.name}</span><span>${a.file===selected?"✔":""}</span>`;

        div.onclick=()=>{
            selected=a.file;
            loadAzan();
        };

        list.appendChild(div);
    });
}

function saveSettings(){

    let s=getSettings();

    s.azan=selected;
    s.lang=document.getElementById("langSelect").value;
    s.dark=document.getElementById("darkToggle").checked;

    saveSettingsToStorage(s);

    applySettings();

    document.getElementById("status").innerText =
    TEXT[s.lang].saved;
}

function testAzan(){
    if(audio) audio.pause();
    audio=new Audio("../assets/"+selected);
    audio.play();
}

document.addEventListener("DOMContentLoaded",()=>{

    let s=getSettings();

    selected=s.azan;

    document.getElementById("langSelect").value=s.lang;
    document.getElementById("darkToggle").checked=s.dark;

    loadAzan();
    applySettings();
});
</script>

</body>
</html>
