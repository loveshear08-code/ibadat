<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBADAT</title>
<link rel="stylesheet" href="../css/home.css">
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
<span id="city">Kolkata</span>
<span id="date"></span>
</div>

<!-- MAIN -->
<div class="main">

<!-- BISMILLAH -->
<div class="card">
<div class="bismillah-ar">بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
<div id="bismillahMeaning"></div>
</div>

<!-- STATUS -->
<div class="card">

<div class="status-top">
<div id="todayDay"></div>
<div id="weather"></div>
</div>

<div class="status-timer">
<div id="clock"></div>
<div id="countdown"></div>
</div>

<div class="status-name">
<div id="currentPrayerName"></div>
<div id="nextPrayerName"></div>
</div>

</div>

<!-- PRAYER GRID -->
<div class="card">
<div class="grid" id="prayerGrid"></div>
</div>

<!-- FEATURES -->
<div class="feature-grid">
<div class="feature" id="namaz"></div>
<div class="feature" id="quran"></div>
<div class="feature" id="dua"></div>
<div class="feature" id="hadith"></div>
<div class="feature" id="qibla"></div>
<div class="feature" id="tasbih"></div>
</div>

</div>

<!-- BOTTOM -->
<div class="bottom-bar">
<span id="bottomText"></span>
</div>

<script src="js/home.js"></script>

</body>
</html>
