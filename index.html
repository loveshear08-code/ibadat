<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IBADAT</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
<span id="city">Loading...</span>
<span id="date"></span>
</div>

<!-- BISMILLAH -->
<div class="card" id="bismillahCard">
<h2 class="arabic">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</h2>
<p id="bismillahMeaning"></p>
</div>

<!-- TIME CARD -->
<div class="card">

<div class="row">
<h3 id="todayDay"></h3>
<h3 id="weather"></h3>
</div>

<h1 id="clock"></h1>

<div class="row">
<span id="currentPrayerName"></span>
<span>/</span>
<span id="nextPrayerName"></span>
</div>

</div>

<!-- PRAYER GRID -->
<div class="grid" id="prayerGrid"></div>

<!-- FEATURES -->
<div class="grid2">

<div id="namaz" class="btn"></div>
<div id="quran" class="btn"></div>
<div id="dua" class="btn"></div>
<div id="hadith" class="btn"></div>
<div id="qibla" class="btn"></div>
<div id="tasbih" class="btn"></div>

</div>

<!-- BOTTOM SCROLL -->
<div class="bottom-bar">
<span id="bottomText"></span>
</div>

<script src="js/home.js"></script>

</body>
</html>
