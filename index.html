<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ইবাদত - Ibadat</title>
    <style>
        :root { --bg-color: #fcf9f0; --card-bg: #f0f9ed; --text-primary: #1b3d18; --accent-red: #b71c1c; --gold: #7a5e12; }
        html, body { height: 100vh; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; background-color: var(--bg-color); font-family: 'Segoe UI', Arial, sans-serif; }
        .header { height: 50px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 19px; padding: 0 15px; color: var(--text-primary); }
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 8px 12px; gap: 12px; justify-content: space-around; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid #d0e0d0; width: 100%; box-sizing: border-box; }
        .card-bismillah { flex: 0.7; }
        .card-timer { flex: 2.3; }
        .card-prayer { flex: 1.6; }
        .card-buttons { flex: 0.9; border: none; background: transparent; box-shadow: none; padding: 0; }
        .bismillah { font-size: 26px; font-weight: 900; color: var(--gold); }
        .bismillah-p { font-size: 15px; font-weight: 800; margin-top: 4px; color: #444; }
        .wakto-label { font-size: 18px; font-weight: 800; color: #000; }
        .timer-display { font-size: 50px; font-weight: 900; margin: 5px 0; letter-spacing: 1px; line-height: 1; }
        .timer-green { color: #1e7e34; }
        .timer-red { color: var(--accent-red); }
        .next-wakto-label { color: var(--accent-red); font-weight: 800; font-size: 18px; margin-top: 8px; }
        .prayer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .prayer-item { padding: 6px; border-bottom: 2px solid #c0d0c0; font-size: 17px; font-weight: 800; text-align: center; color: #000; }
        .time-val { font-weight: 900; color: #222; display: block; font-size: 18px; margin-top: 4px; }
        .features { display: flex; gap: 15px; width: 100%; height: 100%; }
        .btn { flex: 1; background: #ffffff; border-radius: 20px; text-decoration: none; color: var(--text-primary); font-weight: 900; font-size: 18px; border: 2px solid #bccdbc; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
        .btn-icon { font-size: 32px; }
        .footer-marquee { height: 45px; background: #fff; border-top: 2px solid #eee; display: flex; align-items: center; overflow: hidden; }
        .marquee-text { white-space: nowrap; animation: marquee 20s linear infinite; color: var(--accent-red); font-weight: 900; font-size: 17px; padding-left: 100%; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-250%); } }
    </style>
</head>
<body>
    <audio id="azanAudio"><source src="https://www.islamcan.com/audio/adhan/makkah.mp3" type="audio/mpeg"></audio>
    <div class="header">
        <span id="location-text">লোকেশন লোড হচ্ছে...</span>
        <span id="current-date">-- ---, ----</span>
    </div>
    <div class="main-container">
        <div class="card card-bismillah"><div class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div><p class="bismillah-p">"আল্লাহর নামে শুরু করছি"</p></div>
        <div class="card card-timer">
            <div class="wakto-label">বর্তমান ওয়াক্ত: <span id="current-wakto-name">...</span></div>
            <div class="timer-display timer-green" id="live-clock">০০:০০:০০</div>
            <div class="next-wakto-label">পরবর্তী ওয়াক্ত: <span id="next-name">...</span></div>
            <div class="timer-display timer-red" id="countdown-timer">০০:০০:০০</div>
        </div>
        <div class="card card-prayer">
            <div class="prayer-grid">
                <div class="prayer-item">ফজর<br><span class="time-val" id="Fajr">--:--</span></div>
                <div class="prayer-item">সূর্যোদয়<br><span class="time-val" id="Sunrise">--:--</span></div>
                <div class="prayer-item">জোহর<br><span class="time-val" id="Dhuhr">--:--</span></div>
                <div class="prayer-item">আসর<br><span class="time-val" id="Asr">--:--</span></div>
                <div class="prayer-item">মাগরিব<br><span class="time-val" id="Maghrib">--:--</span></div>
                <div class="prayer-item">এশা<br><span class="time-val" id="Isha">--:--</span></div>
            </div>
        </div>
        <div class="card card-buttons">
            <div class="features">
                <a href="#" class="btn"><span class="btn-icon">📖</span><span>নামাজ শিক্ষা</span></a>
                <a href="#" class="btn"><span class="btn-icon">🕌</span><span>আল কুরআন</span></a>
            </div>
        </div>
    </div>
    <div class="footer-marquee"><div class="marquee-text">"হে আল্লাহ! আমাদের নামাজ ও ইবাদত কবুল করুন। আমীন।"</div></div>
    <script>
        let prayerTimes = {};
        const bnNumbers = {'0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯'};
        const bnNames = { "Fajr": "ফজর", "Dhuhr": "জোহর", "Asr": "আসর", "Maghrib": "মাগরিব", "Isha": "এশা", "Sunrise": "সূর্যোদয়" };
        function getBnNum(num) { return num.toString().split('').map(d => bnNumbers[d] || d).join(''); }
        function updateClock() {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('bn-BD', { day: 'numeric', month: 'long', year: 'numeric' });
            let timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
            document.getElementById('live-clock').innerText = getBnNum(timeStr);
            if (Object.keys(prayerTimes).length > 0) checkLogic();
        }
        async function fetchByLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    try {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=1`);
                        const data = await res.json();
                        prayerTimes = data.data.timings;
                        // বাংলা লোকেশন নাম আনার জন্য আপডেট করা হয়েছে
                        const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=bn`);
                        const geoData = await geoRes.json();
                        const cityName = geoData.address.city || geoData.address.town || geoData.address.suburb || geoData.address.state || "আপনার এলাকা";
                        document.getElementById('location-text').innerText = cityName; 
                        updateUI();
                    } catch (err) { fetchByCity("Kolkata"); }
                }, () => fetchByCity("Kolkata"));
            } else { fetchByCity("Kolkata"); }
        }
        async function fetchByCity(city) {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=India&method=1`);
                const data = await res.json();
                prayerTimes = data.data.timings;
                document.getElementById('location-text').innerText = (city === "Kolkata") ? "কলকাতা" : city;
                updateUI();
            } catch (err) { console.error("Error"); }
        }
        function updateUI() { Object.keys(bnNames).forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerText = getBnNum(prayerTimes[id]); }); }
        function checkLogic() {
            const now = new Date();
            const nowStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            let current = "এশা", next = "Fajr";
            if (nowStr >= prayerTimes.Fajr && nowStr < prayerTimes.Dhuhr) { current = "ফজর"; next = "Dhuhr"; }
            else if (nowStr >= prayerTimes.Dhuhr && nowStr < prayerTimes.Asr) { current = "জোহর"; next = "Asr"; }
            else if (nowStr >= prayerTimes.Asr && nowStr < prayerTimes.Maghrib) { current = "আসর"; next = "Maghrib"; }
            else if (nowStr >= prayerTimes.Maghrib && nowStr < prayerTimes.Isha) { current = "মাগরিব"; next = "Isha"; }
            document.getElementById('current-wakto-name').innerText = current;
            document.getElementById('next-name').innerText = bnNames[next];
            const [h, m] = prayerTimes[next].split(':');
            let nDate = new Date(); nDate.setHours(h, m, 0);
            if (nDate < now) nDate.setDate(nDate.getDate() + 1);
            let diff = nDate - now;
            let dh = Math.floor(diff / 3600000), dm = Math.floor((diff % 3600000) / 60000), ds = Math.floor((diff % 60000) / 1000);
            document.getElementById('countdown-timer').innerText = getBnNum(`${dh.toString().padStart(2,'0')}:${dm.toString().padStart(2,'0')}:${ds.toString().padStart(2,'0')}`);
        }
        setInterval(updateClock, 1000);
        fetchByLocation();
    </script>
</body>
</html>
