<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IBADAT</title>

<link rel="stylesheet" href="home.css">

</head>

<body>

<!-- TOP BAR -->

<div class="topbar">
<span id="city"></span>
<span id="date"></span>
</div>


<!-- MAIN -->

<div class="main">


<!-- BISMILLAH -->

<div class="card bismillah-card">

<div class="bismillah-ar">
بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
</div>

<div id="bismillahMeaning" class="bismillah-meaning"></div>

</div>



<!-- PRAYER STATUS -->

<div class="card prayer-status">

<div class="status-top">

<span id="todayDay"></span>

<span id="weather"></span>

</div>


<div class="timer-grid">

<div class="current-side">

<div id="currentPrayerName" class="prayer-name"></div>

<div id="clock" class="timer"></div>

</div>


<div class="divider">/</div>


<div class="next-side">

<div id="nextPrayerName" class="prayer-name"></div>

<div id="countdown" class="countdown"></div>

</div>

</div>

</div>



<!-- PRAYER TIMES GRID -->

<div class="card prayer-grid" id="prayerGrid"></div>



<!-- FEATURES -->

<div class="feature-grid">

<!-- ROW 1 -->

<div class="feature-box" id="namaz"></div>
<div class="feature-box" id="quran"></div>

<!-- ROW 2 -->

<div class="feature-box" id="dua"></div>
<div class="feature-box" id="hadith"></div>

<!-- ROW 3 -->

<div class="feature-box" id="qibla"></div>
<div class="feature-box" id="tasbih"></div>

</div>


</div>



<!-- BOTTOM BAR -->

<div class="bottom-bar">

<marquee id="bottomText"></marquee>

</div>



<script src="home.js"></script>

</body>
</html>
